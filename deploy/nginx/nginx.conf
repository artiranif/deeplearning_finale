events {
    worker_connections 1024;
}

http {
    # ── Redirect HTTP → HTTPS ──────────────────────────────
    server {
        listen 80;
        server_name api.python-community.com mlflow.python-community.com;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── API FastAPI (api.python-community.com) ─────────────
    server {
        listen 443 ssl;
        server_name api.python-community.com;

        ssl_certificate     /etc/letsencrypt/live/api.python-community.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.python-community.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS pré-vol
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Length' 0;
                return 204;
            }
        }
    }

    # ── MLflow (mlflow.python-community.com) ───────────────
    server {
        listen 443 ssl;
        server_name mlflow.python-community.com;

        ssl_certificate     /etc/letsencrypt/live/mlflow.python-community.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mlflow.python-community.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://mlflow:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
