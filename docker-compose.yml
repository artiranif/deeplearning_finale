services:
  # ── API FastAPI ────────────────────────────────────────────
  api:
    image: sonar-classifier:latest
    container_name: sonar-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ALLOWED_ORIGINS=https://python-community.com,https://api.python-community.com,http://localhost:3000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sonar-net

  # ── MLflow Tracking Server ────────────────────────────────
  mlflow:
    image: sonar-classifier:latest
    container_name: sonar-mlflow
    restart: unless-stopped
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /app/mlruns
      --host 0.0.0.0
      --port 5000
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/app/mlruns
      - mlflow-db:/app
    networks:
      - sonar-net

volumes:
  mlflow-data:
  mlflow-db:

networks:
  sonar-net:
    driver: bridge
